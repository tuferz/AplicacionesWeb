spring.application.name=tienda

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:tiendadb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (acceso en http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Server
server.port=8081

# JWT Configuration
jwt.secret=MiClaveSecretaMuySuperLargaYSeguraQueNoDebeSerSerializadaDeLaFormaQueHeUsado1234567890
jwt.expiration=86400000

